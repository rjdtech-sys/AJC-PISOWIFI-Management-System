<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account Expired</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e5e7eb; }
      .wrap { max-width: 760px; margin: 0 auto; padding: 32px 18px; }
      .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 22px; }
      h1 { margin: 0 0 8px; font-size: 20px; letter-spacing: 0.02em; }
      p { margin: 8px 0; color: #cbd5e1; line-height: 1.5; }
      .hint { margin-top: 14px; font-size: 12px; color: #94a3b8; }
      .code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; color: #e2e8f0; }
      a { color: #60a5fa; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>PPPoE Account Expired</h1>
        <p>Your PPPoE account has reached its expiration. Internet access is restricted.</p>
        <p>Please contact the administrator to renew your account.</p>
        <p class="hint">If you are the admin, open the admin panel and extend the expiration date/time.</p>
        <p class="hint code">Error Page: /error.html</p>
      </div>
    </div>
  </body>
</html>
